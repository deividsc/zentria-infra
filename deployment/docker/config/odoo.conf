# ===========================================
# Odoo Configuration
# ===========================================

[options]
# Admin password (change in production!)
admin_passwd = CHANGE_THIS_MASTER_PASSWORD

# Database
db_host = ${DB_HOST:-db}
db_port = ${DB_PORT:-5432}
db_name = ${DB_NAME:-odoo}
db_user = ${DB_USER:-odoo}
db_password = ${DB_PASSWORD}

# Filtering
dbfilter = ^%d$

# Addons paths (separated by commas)
addons_path = /mnt/extra-addons,/mnt/custom-addons,/usr/lib/python3/dist-packages/odoo/addons

# Logging
logfile = /var/lib/odoo/odoo.log
log_level = ${LOG_LEVEL:-info}
log_handler = :INFO

# Workers
workers = ${ODOO_WORKERS:-2}
max_crawl_depth = ${ODOO_MAX_CRAWL_DEPTH:-}

# Memory
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

# Longpolling (for live chat/notifications)
gevent_port = 8072

# Proxy
proxy_mode = ${PROXY_MODE:-True}

# Email (SMTP)
smtp_server = ${SMTP_HOST:-smtp.example.com}
smtp_port = ${SMTP_PORT:-587}
smtp_user = ${SMTP_USER:-}
smtp_password = ${SMTP_PASSWORD:-}
smtp_ssl = ${SMTP_SSL:-False}
smtp_tls = ${SMTP_TLS:-True}

# System
reports_undefined = raise
