# ===========================================
# Ansible - Main Playbook
# ===========================================

---
- name: Deploy Zentria Odoo Server
  hosts: odoo_servers
  become: true
  vars:
    app_user: odoo
    app_dir: /opt/zentria
    odoo_version: "17"
    db_password: ""  # Set via vault or env
    domain_name: ""
    ssl_email: ""

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - unzip
          - git
          - ufw
          - fail2ban
        state: present

  roles:
    - role: zentria
      tags: zentria

  handlers:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded

    - name: Restart nginx
      service:
        name: nginx
        state: restarted

    - name: Restart odoo
      docker_container:
        name: odoo
        state: restarted

    - name: Restart postgres
      service:
        name: postgresql
        state: restarted
