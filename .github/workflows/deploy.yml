# ===========================================
# GitHub Actions - CI/CD Pipeline
# ===========================================

name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
  ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

jobs:
  # ===========================================
  # Infrastructure Validation
  # ===========================================
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  # ===========================================
  # Ansible Linting
  # ===========================================
  ansible-lint:
    name: Lint Ansible
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible & Lint
        run: |
          pip install ansible ansible-lint
          ansible-lint ansible/playbook.yml

  # ===========================================
  # Deploy to Production
  # ===========================================
  deploy:
    name: Deploy Odoo Server
    runs-on: ubuntu-latest
    needs: [terraform-validate, ansible-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible

      - name: Setup GCP Credentials
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" > gcp-key.json
          gcloud auth activate-service-account --key-file=gcp-key.json
          gcloud config set project $GCP_PROJECT_ID

      - name: Get VM IP
        id: vm-info
        run: |
          VM_IP=$(gcloud compute instances describe odoo-zentria \
            --zone=us-central1-a \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "VM_IP=$VM_IP" >> $GITHUB_OUTPUT

      - name: Run Ansible Playbook
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          VM_IP: ${{ steps.vm-info.outputs.VM_IP }}
        run: |
          # Update inventory with current VM IP
          sed -i "s/ansible_host=.*/ansible_host=$${VM_IP}/" ansible/inventory.ini
          
          # Run playbook
          ansible-playbook -i ansible/inventory.ini ansible/playbook.yml

      - name: Verify Deployment
        run: |
          curl -s -o /dev/null -w "%{http_code}" http://${{ steps.vm-info.outputs.VM_IP }}:8069/web/login

  # ===========================================
  # Notify on Failure
  # ===========================================
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    
    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Deployment failed for Zentria",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Deployment Failed*\nRepository: ${{ github.repository }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
